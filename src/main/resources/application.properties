# Nombre de la aplicaciï¿½n
spring.application.name=backend

# --- CONFIGURACIï¿½N DE BASE DE DATOS ---
spring.datasource.url=jdbc:mysql://localhost:3306/sis_control_2?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIï¿½N JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# En Spring Boot 4 / Hibernate 7 NO se definen dialectos antiguos para MySQL 8+ para evitar fallos de metadatos

# --- MANEJO DE EXCEPCIONES Y RUTAS ---
spring.mvc.throw-exception-if-no-handler-found=true

# --- CONFIGURACIÃ“N DE TIMEZONE PARA JSON ---
spring.jackson.time-zone=America/Santiago