# Nombre de la aplicacion
spring.application.name=backend

# Activa el entorno de desarrollo de forma predeterminada
spring.profiles.active=dev

# --- CONFIGURACION DE BASE DE DATOS ---
spring.datasource.url=jdbc:mysql://localhost:3306/sis_control?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACION JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# En Spring Boot 4 / Hibernate 7 NO se definen dialectos antiguos para MySQL 8+ para evitar fallos de metadatos

# --- MANEJO DE EXCEPCIONES Y RUTAS ---
spring.mvc.throw-exception-if-no-handler-found=true
