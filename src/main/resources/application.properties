# Nombre de la aplicaci�n
spring.application.name=backend

# --- CONFIGURACIÓN DEL SERVIDOR ---
server.address=0.0.0.0
server.port=8080

# --- CONFIGURACI�N DE BASE DE DATOS ---
spring.datasource.url=jdbc:mysql://localhost:3306/sis_control_2?createDatabaseIfNotExist=true&serverTimezone=America/Santiago&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACI�N JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# En Spring Boot 4 / Hibernate 7 NO se definen dialectos antiguos para MySQL 8+ para evitar fallos de metadatos

# --- MANEJO DE EXCEPCIONES Y RUTAS ---
spring.mvc.throw-exception-if-no-handler-found=true

# --- CONFIGURACIÓN DE TIMEZONE PARA JSON ---
spring.jackson.time-zone=America/Santiago

# --- CONFIGURACIÓN GEMINI AI (MVP) ---
# La API Key se lee desde la variable de entorno GEMINI_API_KEY.
# Si no existe la variable, el valor queda vacío y el servicio lo detecta
# y lanza IllegalStateException al intentar llamar a la IA.
# Para desarrollo local, puedes definirla en application-local.properties (NO versionar).
gemini.api.key=${GEMINI_API_KEY:}

