# Archivo: src/main/resources/application-dev.properties

# --- CONFIGURACIÓN DE BASE DE DATOS (LOCAL / TESTING) ---
spring.datasource.url=jdbc:mariadb://localhost:3306/sis_control?createDatabaseIfNotExist=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# --- CONFIGURACIÓN JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=com.siscontrol.backend.config.CustomMariaDBDialect

# Desactivar open-in-view para evitar warnings de rendimiento en consola
spring.jpa.open-in-view=false

# --- MANEJO DE EXCEPCIONES Y RUTAS ---
spring.mvc.throw-exception-if-no-handler-found=true

# Silenciar advertencias de compatibilidad de Hibernate con MariaDB local
logging.level.org.hibernate.orm.core=ERROR